version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      - APP_ENV=testing
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=casino_test
      - DB_USERNAME=root
      - DB_PASSWORD=root
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - casino-network

  db:
    image: mysql:5.7
    environment:
      - MYSQL_DATABASE=casino_test
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_PASSWORD=root
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - casino-network

volumes:
  mysql-data:

networks:
  casino-network:
    driver: bridge
